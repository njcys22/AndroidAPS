name: Android CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    
    - name: Gradle Caching
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Decode and save keystore
      env:
        STORE_FILE_BASE64: ${{ secrets.STORE_FILE_BASE64 }}
      run: |
        echo $STORE_FILE_BASE64 | base64 --decode > app/keystore.jks
    
    - name: Build with Gradle
      run: |
        ./gradlew assembleFullRelease \
          --build-cache \
          --parallel \
          --daemon \
          -Dorg.gradle.jvmargs="-Xmx8g -XX:+UseParallelGC -Xss1024m" \
          -Dkotlin.daemon.jvm.options="-Xmx2g"
      env:
        ORG_GRADLE_PROJECT_storeFile: "app/keystore.jks"
        ORG_GRADLE_PROJECT_storePassword: "${{ secrets.STORE_PASSWORD }}"
        ORG_GRADLE_PROJECT_keyAlias: "${{ secrets.KEY_ALIAS }}"
        ORG_GRADLE_PROJECT_keyPassword: "${{ secrets.KEY_PASSWORD }}"
    
    - name: Clean up sensitive files
      if: always()
      run: rm -f app/keystore.jks
    
    - name: Archive production artifacts
      uses: actions/upload-artifact@v4
      with:
        name: aaps-release-apk
        path: app/build/outputs/apk/full/release/
        retention-days: 7
